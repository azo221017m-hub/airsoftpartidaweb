<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="128" height="128">

  <!-- ── PALIACATE EN LA CABEZA (pelón con paliacate anudado) ── -->
  <!-- base del paliacate — tela roja/naranja que cubre toda la cabeza -->
  <rect x="5"  y="1"  width="22" height="9"  fill="#c83020"/>
  <!-- patrón del paliacate (líneas diagonales estilo bandana) -->
  <rect x="5"  y="2"  width="2"  height="1"  fill="#e04030"/>
  <rect x="9"  y="2"  width="2"  height="1"  fill="#e04030"/>
  <rect x="13" y="2"  width="2"  height="1"  fill="#e04030"/>
  <rect x="17" y="2"  width="2"  height="1"  fill="#e04030"/>
  <rect x="21" y="2"  width="2"  height="1"  fill="#e04030"/>
  <rect x="7"  y="4"  width="2"  height="1"  fill="#e04030"/>
  <rect x="11" y="4"  width="2"  height="1"  fill="#e04030"/>
  <rect x="15" y="4"  width="2"  height="1"  fill="#e04030"/>
  <rect x="19" y="4"  width="2"  height="1"  fill="#e04030"/>
  <rect x="23" y="4"  width="2"  height="1"  fill="#e04030"/>
  <rect x="5"  y="6"  width="2"  height="1"  fill="#e04030"/>
  <rect x="9"  y="6"  width="2"  height="1"  fill="#e04030"/>
  <rect x="13" y="6"  width="2"  height="1"  fill="#e04030"/>
  <rect x="17" y="6"  width="2"  height="1"  fill="#e04030"/>
  <rect x="21" y="6"  width="2"  height="1"  fill="#e04030"/>
  <!-- borde inferior del paliacate (cubre la frente) -->
  <rect x="4"  y="8"  width="24" height="2"  fill="#a02010"/>
  <!-- nudo del paliacate — lado derecho, tela colgando -->
  <rect x="24" y="1"  width="4"  height="3"  fill="#c83020"/>
  <rect x="25" y="3"  width="3"  height="2"  fill="#a02010"/>
  <rect x="26" y="5"  width="2"  height="3"  fill="#c83020"/>

  <!-- ── CARA DELGADA (piel morena clara, pelón) ── -->
  <rect x="8"  y="10" width="16" height="12" fill="#c8955a"/>
  <!-- sienes -->
  <rect x="8"  y="10" width="2"  height="12" fill="#a87848"/>
  <rect x="22" y="10" width="2"  height="12" fill="#a87848"/>

  <!-- ── OJOS (café oscuro, expresivos) ── -->
  <rect x="10" y="13" width="4"  height="2"  fill="#5a3a1a"/>
  <rect x="18" y="13" width="4"  height="2"  fill="#5a3a1a"/>
  <!-- pupilas -->
  <rect x="11" y="13" width="2"  height="2"  fill="#1a0e06"/>
  <rect x="19" y="13" width="2"  height="2"  fill="#1a0e06"/>
  <!-- brillo -->
  <rect x="12" y="13" width="1"  height="1"  fill="#e8c890"/>
  <rect x="20" y="13" width="1"  height="1"  fill="#e8c890"/>
  <!-- cejas -->
  <rect x="10" y="12" width="4"  height="1"  fill="#3a2010"/>
  <rect x="18" y="12" width="4"  height="1"  fill="#3a2010"/>

  <!-- ── NARIZ DELGADA ── -->
  <rect x="15" y="15" width="2"  height="3"  fill="#a87848"/>
  <rect x="14" y="17" width="4"  height="1"  fill="#9a6c40"/>

  <!-- ── BOCA (ligera sonrisa / neutra) ── -->
  <rect x="12" y="19" width="8"  height="1"  fill="#7a4828"/>
  <rect x="13" y="20" width="6"  height="1"  fill="#8a5a38"/>

  <!-- ── CUELLO DELGADO ── -->
  <rect x="12" y="22" width="8"  height="3"  fill="#c8955a"/>
  <rect x="12" y="24" width="8"  height="1"  fill="#a87848"/>

  <!-- ── UNIFORME VERDE / HOMBROS ── -->
  <rect x="5"  y="25" width="22" height="7"  fill="#3a4a2e"/>
  <!-- parche dorado izquierdo -->
  <rect x="6"  y="27" width="5"  height="3"  fill="#c8a830"/>
  <rect x="7"  y="27" width="3"  height="1"  fill="#e8d060"/>
  <!-- insignia derecha -->
  <rect x="21" y="27" width="5"  height="3"  fill="#556644"/>
  <rect x="22" y="28" width="3"  height="1"  fill="#aabb88"/>

</svg>
